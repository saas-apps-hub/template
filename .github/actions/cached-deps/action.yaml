name: 'Get & Cache Dependencies'
description: 'Cache pnpm store and run pnpm install (node_modules recreated each run, symlinks always correct)'
inputs:
  cache-key-prefix:
    description: 'Prefix for cache key (default: pnpm-store)'
    required: false
    default: 'pnpm-store'
  fail-on-cache-miss:
    description: 'Fail the job if cache is not found'
    required: false
    default: 'false'
  enable-cross-os-archive:
    description: 'Enable cross-OS caching (allows sharing cache across different OS)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: 'Restore pnpm store'
      uses: 'actions/cache/restore@v4'
      id: cache-pnpm-store
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-${{ runner.os }}-
          ${{ inputs.cache-key-prefix }}-
        fail-on-cache-miss: ${{ inputs.fail-on-cache-miss }}
        enableCrossOsArchive: ${{ inputs.enable-cross-os-archive }}

    - name: 'Install Dependencies'
      run: pnpm install --frozen-lockfile
      shell: bash

    - name: 'Save pnpm store'
      if: steps.cache-pnpm-store.outputs.cache-hit != 'true'
      uses: 'actions/cache/save@v4'
      with:
        path: ~/.local/share/pnpm/store
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        enableCrossOsArchive: ${{ inputs.enable-cross-os-archive }}
