name: CI

on:
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: 22

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - name: Get Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Must match semver in package.json `packageManager` (pnpm/action-setup rejects a mismatch vs `pnpm@`).
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # @see https://github.com/marketplace/actions/nx-set-shas
      - name: Set SHAs for Nx Cloud
        uses: nrwl/nx-set-shas@v5

      - name: Run Linting, Testing, Typechecking and Building
        run: |
          pnpm nx affected -t lint test typecheck
          pnpm nx affected -t build --exclude="mobile" --exclude="libs/*"
