name: CD

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - "apps/backend/**"
      - "apps/marketing/**"
      - "apps/backend/Dockerfile"
      - "apps/marketing/Dockerfile"
      - "docker-compose.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/cd.yml"

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  PROJECT: template
  NODE_VERSION: 22
  TAG: latest

jobs:
  cd:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write # Required for pushing to GitHub Container Registry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Load & Cache dependencies
        uses: ./.github/actions/cached-deps

        # @see https://github.com/marketplace/actions/nx-set-shas
      - name: Set SHAs for Nx Cloud
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build with Nx
        run: pnpm nx run-many -t=docker-push -p=backend,marketing

      - name: Extract metadata for server
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/shot2post-server
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Extract metadata for marketing
        id: meta-marketing
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/shot2post-marketing
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push marketing image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/marketing/Dockerfile
          push: true
          tags: ${{ steps.meta-marketing.outputs.tags }}
          labels: ${{ steps.meta-marketing.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Compute image tag (short sha)
        id: vars
        run: echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Summary
        run: |
          echo "## 🐳 Docker Images Built and Pushed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Server Image" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.meta-server.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Marketing Image" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.meta-marketing.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images are available at:" >> $GITHUB_STEP_SUMMARY
          echo "- https://github.com/${{ github.repository }}/pkgs/container/shot2post-server" >> $GITHUB_STEP_SUMMARY
          echo "- https://github.com/${{ github.repository }}/pkgs/container/shot2post-marketing" >> $GITHUB_STEP_SUMMARY

      - name: Deploy to Coolify
        run: |
          curl --request GET '${{ secrets.COOLIFY_WEBHOOK }}' --header 'Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}'
