# REGISTRY: ghcr.io
# OWNER: saas-apps-hub
# PROJECT: template
# TAG: latest

services:
  backend:
    image: ${REGISTRY}/${OWNER}/${PROJECT}-backend:${TAG}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8100}:8100"
    environment:
      - NODE_ENV=production
      - BACKEND_PORT=${BACKEND_PORT:-8100}
    networks:
      - ${PROJECT}-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node",
          "-e",
          "require('http').get('http://localhost:${BACKEND_PORT:-8100}/health', (r) => process.exit(r.statusCode >= 200 && r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 90s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  marketing:
    image: ${REGISTRY}/${OWNER}/${PROJECT}-marketing:${TAG}
    pull_policy: always
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "${PORT:-3100}:3100"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3100}
      - HOSTNAME=0.0.0.0
      - NEXTJS_TELEMETRY_DISABLED=1
    networks:
      - ${PROJECT}-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node",
          "-e",
          "require('http').get('http://localhost:${PORT:-3100}/', (r) => process.exit(r.statusCode >= 200 && r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 90s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

networks:
  ${PROJECT}-network:
    driver: bridge
