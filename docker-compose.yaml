# ⚠️ IMPORTANT NOTICE:
# Make sure all the required environment variables are set in the environment before running this file.

services:
  backend:
    image: ${REGISTRY}/${OWNER}/template-backend:${TAG}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - NODE_ENV=production
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      - BACKEND_HOST=${BACKEND_HOST:-0.0.0.0}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node",
          "-e",
          "require('http').get('http://localhost:${BACKEND_PORT:-8000}/health', (r) => process.exit(r.statusCode >= 200 && r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 90s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

  marketing:
    image: ${REGISTRY}/${OWNER}/template-marketing:${TAG}
    pull_policy: always
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
      - HOSTNAME=0.0.0.0
      - NEXTJS_TELEMETRY_DISABLED=1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node",
          "-e",
          "require('http').get('http://localhost:${PORT:-3000}/', (r) => process.exit(r.statusCode >= 200 && r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 90s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
